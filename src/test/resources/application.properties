# Test profile — uses H2 in-memory so tests never need a real Postgres instance
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Flyway disabled for tests — JPA handles schema from annotations
spring.flyway.enabled=false

# Dummy JWT secret for tests — not a real secret
jwt.secret=test-secret-key-for-unit-tests-only-32chars!!
jwt.expiration-ms=3600000
