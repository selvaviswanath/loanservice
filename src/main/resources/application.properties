spring.application.name=loan-service

# H2 in-memory DB — data lives only for the lifetime of the app (good for audit demos)
spring.datasource.url=jdbc:h2:mem:loandb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let JPA create the schema automatically from entities
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 console available at /h2-console for quick inspection
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
