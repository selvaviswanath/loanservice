spring.application.name=loan-service

# H2 in-memory DB — data lives only for the lifetime of the app (good for audit demos)
spring.datasource.url=jdbc:h2:mem:loandb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let JPA create the schema automatically from entities
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 console available at /h2-console for quick inspection
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT — secret must be at least 32 chars for HMAC-SHA256
# In production, load this from an environment variable or secrets manager
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000

# Swagger UI at /swagger-ui/index.html, JSON spec at /v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

