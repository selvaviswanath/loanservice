spring.application.name=loan-service

# — PostgreSQL connection (all sensitive values come from environment variables) —
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/loandb}
spring.datasource.username=${DB_USERNAME:loanuser}
spring.datasource.password=${DB_PASSWORD:loanpass123}
spring.datasource.driver-class-name=org.postgresql.Driver

# — JPA — let Flyway manage the schema, never let Hibernate auto-create/drop —
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# — Flyway — picks up scripts from src/main/resources/db/migration automatically —
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# — JWT (secret MUST come from environment in production) —
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# — Swagger UI —
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
